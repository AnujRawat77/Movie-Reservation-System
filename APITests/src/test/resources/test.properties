# ???????????????????????????????????????????????????????????????
# CineReserve Automation Test Configuration
# Override any value at runtime:  mvn test -Dkey=value
#                              or via environment variable: KEY=value
# ???????????????????????????????????????????????????????????????

# ?? API Layer ???????????????????????????????????????????????????
api.base.url=http://localhost:8080
connect.timeout.ms=10000
read.timeout.ms=30000

# Default admin credentials (used by API tests)
admin.email=admin@cinereserve.com
admin.password=Admin@123

# ?? UI Layer (Selenium) ?????????????????????????????????????????
# Browser: chrome (default) | firefox | edge
ui.browser=chrome

# Frontend URL served by the React/Vite dev server
ui.base.url=http://localhost:3000

# Set to true for CI / headless environments
ui.headless=false

# Selenium timeouts (seconds)
ui.implicit.wait.seconds=5
ui.explicit.wait.seconds=15
ui.page.load.timeout.seconds=30

