spring.application.name=MovieReservationSystem
server.port=8080

# H2 Database
spring.datasource.url=jdbc:h2:mem:moviedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# JWT
jwt.secret=cinereserve-super-secret-key-that-is-very-long-for-security-purposes-min256bits
jwt.expiration=86400000

# CORS
cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://localhost:8080

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Business rules
reservation.premium-seat-multiplier=1.5
showtime.buffer-minutes=15
hall.premium-rows=D,E

# Jackson - configured via JacksonConfig bean
